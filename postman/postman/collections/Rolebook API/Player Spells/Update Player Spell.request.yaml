$kind: http-request
url: "{{baseUrl}}/players/{{playerId}}/spells/{{playerSpellId}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "isPrepared": true
    }
scripts:
  - type: afterResponse
    code: pm.test("Status 204", () => pm.response.to.have.status(204));
    language: text/javascript
order: 3000
