$kind: http-request
url: "{{baseUrl}}/players/{{playerId}}/spells"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "spellId": "{{arsenalSpellId}}",
      "isPrepared": false
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 201", () => pm.response.to.have.status(201));
      const json = pm.response.json();
      pm.environment.set("playerSpellId", json.spellId);
    language: text/javascript
order: 2000
