$kind: http-request
name: Disable Spells/Equipment (campaign DM)
url: "{{baseUrl}}/campaigns/{{campaignId}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "disabledSpells": ["{{arsenalSpellId}}"],
      "disabledEquipment": ["{{arsenalEquipmentId}}"]
    }
scripts:
  - type: afterResponse
    code: pm.test("Status 200", () => pm.response.to.have.status(200));
    language: text/javascript
order: 5000
