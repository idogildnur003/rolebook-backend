$kind: http-request
url: "{{baseUrl}}/campaigns/{{campaignId}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated Name",
      "themeImage": "desert"
    }
scripts:
  - type: afterResponse
    code: pm.test("Status 200", () => pm.response.to.have.status(200));
    language: text/javascript
order: 4000
