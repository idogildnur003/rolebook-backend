$kind: http-request
url: "{{baseUrl}}/campaigns/{{campaignId}}/custom-spells/{{customSpellId}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "description": "A shard of supernatural cold pierces the target for 2d8 cold damage.",
      "level": 3
    }
scripts:
  - type: afterResponse
    code: pm.test("Status 200", () => pm.response.to.have.status(200));
    language: text/javascript
order: 3000
