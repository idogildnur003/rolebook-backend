$kind: http-request
url: "{{baseUrl}}/campaigns/{{campaignId}}/player"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.environment.set("playerId", json.id);
    language: text/javascript
order: 1000
